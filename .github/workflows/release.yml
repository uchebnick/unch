name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-amd64
            runner: macos-13
            asset: unch_Darwin_x86_64.tar.gz
          - name: darwin-arm64
            runner: macos-14
            asset: unch_Darwin_arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build unch
        run: |
          mkdir -p dist
          CGO_ENABLED=1 go build -trimpath -o dist/unch .

      - name: Package archive
        run: |
          tar -C dist -czf "dist/${{ matrix.asset }}" unch

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          shasum -a 256 dist/*.tar.gz > dist/checksums.txt

      - name: Prepare release notes
        run: |
          mkdir -p dist
          notes_file=".github/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$notes_file" ]; then
            cp "$notes_file" dist/release-notes.md
          else
            {
              echo "# ${GITHUB_REF_NAME}"
              echo
              echo "Release published automatically from tag ${GITHUB_REF_NAME}."
            } > dist/release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: unch ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/checksums.txt
